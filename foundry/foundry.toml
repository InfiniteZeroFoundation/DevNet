[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.28" # Pin your compiler version
optimizer = true
optimizer_runs = 200
gas_reports = ["*"]

# The "Magic" fix for Stack too Deep
via_ir = true

# To ignore naming conventions but keep the important ones

[lint]
exclude_lints = ["mixed-case-function", "mixed-case-variable","unaliased-plain-import","unwrapped-modifier-logic", "screaming-snake-case-immutable", "pascal-case-struct"]

[profile.default.optimizer_details]
# first translates your code into Yul. Yul is a low-level, assembly-like language that is much easier for a computer to optimize
yul = true




# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
# RPC endpoints
[rpc_endpoints]
# Local Anvil node
anvil = "http://127.0.0.1:8545"
sepolia = "https://sepolia.infura.io/v3/${INFURA_API_KEY}"
mainnet = "https://mainnet.infura.io/v3/${INFURA_API_KEY}"
optimism-sepolia = "https://optimism-sepolia.infura.io/v3/${INFURA_API_KEY}"
optimism-mainnet = "https://optimism-mainnet.infura.io/v3/${INFURA_API_KEY}"
